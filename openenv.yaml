name: email-triage-v1
version: "1.0.0"
description: >
  Real-world email triage environment where an AI agent must classify,
  prioritize, and respond to a realistic inbox of emails. Simulates the
  daily task performed by executives, customer support agents, and
  knowledge workers worldwide.

author: OpenEnv Submission
license: MIT

task_type: sequential_decision
domain: productivity
real_world_analog: email_management

tasks:
  - id: 0
    name: label-only-easy
    difficulty: easy
    description: Label 3 emails correctly (urgent/normal/spam/promotional)
    min_pass_score: 0.90
    inbox_size: 3

  - id: 1
    name: label-and-priority-medium
    difficulty: medium
    description: Label and prioritize 5 emails accurately
    min_pass_score: 0.75
    inbox_size: 5

  - id: 2
    name: full-triage-hard
    difficulty: hard
    description: Full triage of 8 emails including replies and archiving
    min_pass_score: 0.70
    inbox_size: 8

action_space:
  type: structured
  model: EmailAction
  fields:
    email_id: string
    label:
      type: enum
      values: [urgent, normal, spam, promotional]
    priority:
      type: integer
      range: [1, 5]
    reply:
      type: string
      optional: true
    archive:
      type: boolean

observation_space:
  type: structured
  model: EmailObservation
  fields:
    inbox: list[EmailSummary]
    processed: list[ProcessedSummary]
    step_number: integer
    remaining_emails: integer
    last_action_result: string (optional)

reward:
  range: [0.0, 1.0]
  type: dense
  breakdown:
    label_accuracy: 0.35
    priority_accuracy: 0.30
    reply_quality: 0.20
    archive_efficiency: 0.15
  penalties:
    - "Not archiving spam: -0.20"
    - "Replying to spam: -0.10"

episode:
  termination: inbox_empty
  max_steps: 20

api:
  reset: "env.reset() → EmailObservation"
  step: "env.step(EmailAction) → (EmailObservation, float, bool, dict)"
  state: "env.state() → dict"

dependencies:
  python: ">=3.10"
  packages:
    - pydantic>=2.0
    - openai>=1.0

validate_command: python validate.py
baseline_command: python baseline.py
